apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mcp-guardian.fullname" . }}
  labels:
    {{- include "mcp-guardian.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    {{- toYaml .Values.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "mcp-guardian.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mcp-guardian.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "mcp-guardian.fullname" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: mcp-guardian
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              npm install -g @mcp-guardian/server && \
              mcp-guardian proxy \
                --config {{ .Values.config.mcpConfigPath }} \
                {{- if .Values.config.policy.path }}
                --policy {{ .Values.config.policy.path }} \
                --blocking-mode {{ .Values.config.policy.mode }}
                {{- end }}
          env:
            {{- range $key, $val := .Values.config.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/mcp-guardian
              readOnly: true
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "mcp-guardian.fullname" . }}-config
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "mcp-guardian.fullname" . }}-data
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}