name: Docker Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Verify better-sqlite3 prebuilds in Docker
        run: chmod +x scripts/verify-docker-prebuilds.sh && ./scripts/verify-docker-prebuilds.sh
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/rudraneel93/mcp-guardian:latest
            ghcr.io/rudraneel93/mcp-guardian:${{ github.ref_name }}
      - name: Smoke test image as non-root user
        run: |
          docker run --rm --entrypoint sh ghcr.io/rudraneel93/mcp-guardian:${{ github.ref_name }} -c \
            'id | grep -q uid=1001 && node -e "require(\"better-sqlite3\")" && node dist/cli.js --version'
      - name: Install cosign
        uses: sigstore/cosign-installer@v3.7.0
      - name: Sign container image
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          cosign sign --yes \
            ghcr.io/rudraneel93/mcp-guardian:${{ github.ref_name }} \
            ghcr.io/rudraneel93/mcp-guardian:latest
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/rudraneel93/mcp-guardian:${{ github.ref_name }}
          severity: CRITICAL,HIGH
          exit-code: 1
