name: Threat Model Regen

on:
  push:
    paths:
      - 'default-policy.yaml'
      - 'scenarios/**/*.json'
      - 'src/agentic/threat-modeling/**'
  pull_request:
    paths:
      - 'default-policy.yaml'
      - 'scenarios/**/*.json'
      - 'src/agentic/threat-modeling/**'

jobs:
  threat-model:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Generate threat model
        run: |
          node dist/cli.js threat-model \
            --config scenarios/real-life/proxy-filesystem-config.json \
            --format markdown \
            --output THREATS.generated.md
      - name: Verify THREATS.md structure
        run: test -s THREATS.generated.md && grep -q STRIDE THREATS.generated.md
      - name: Diff against golden fixture
        run: |
          sed 's/^Generated:.*$/Generated: FIXED/' THREATS.generated.md > THREATS.normalized.md
          sed 's/^Generated:.*$/Generated: FIXED/' tests/fixtures/THREATS.proxy-filesystem.golden.md > THREATS.golden.normalized.md
          diff -u THREATS.golden.normalized.md THREATS.normalized.md
